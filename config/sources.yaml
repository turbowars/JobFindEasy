# === Aggregators / niche boards (kept from your 50, only the high-signal ones) ===

remotive:
  # Public JSON API. Pulls software-dev category by default.
  enabled: true
  categories:
    - software-dev
    - product
    - design   # included in case some EM roles get tagged here

aijobs:
  # AI-Jobs.net via RSS. Hits your AI EM target.
  enabled: true

working_nomads:
  # RSS feed.
  enabled: true
  categories:
    - development
    - management

jobspresso:
  # Curated remote-tech RSS feed (https://jobspresso.co/feed/).
  enabled: true

# === Founder-posted / curated (no recruiter spam) ================================

hackernews:
  # "Who is hiring?" monthly thread, via Algolia HN Search API.
  # auto: true resolves the latest thread automatically.
  enabled: true
  auto: true
  keyword_filters:
    # Only retrieve comments matching these keywords (case-insensitive)
    - "engineering manager"
    - "frontend manager"
    - "frontend lead"
    - "director of engineering"
    - "head of engineering"
    - "platform manager"

ycombinator:
  # workatastartup.com backend API. Curated YC companies, often pre-ATS.
  enabled: true
  filters:
    role_types:
      - eng_manager
      - manager
    remote: true
