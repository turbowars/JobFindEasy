# Unified source registry. Each entry is consumed by the corresponding scraper
# in src/scrapers/registry.py. Adding a board = one line.
#
# - For ATS providers (greenhouse, lever, ashby, smartrecruiters, workable, recruitee):
#   the `slug` is the URL fragment, e.g. boards.greenhouse.io/{slug}.
# - For aggregators with a single endpoint (remotive, aijobs, working_nomads, ycombinator):
#   no slug needed.
# - For HN Who's Hiring: needs the monthly thread id, auto-resolved if `auto: true`.
#
# Concurrency: the runner fans out via asyncio with a semaphore; default cap = 10.

defaults:
  concurrency: 10
  request_timeout_seconds: 30
  # Skip a source on a subsequent run if its last successful scrape is within
  # this many minutes. Set to 0 to disable skipping (always re-fetch).
  # Each ATS slug (e.g. greenhouse:airbnb) and each endpoint (e.g. remotive)
  # is tracked independently — a partial run picks up where it left off.
  skip_if_scraped_within_minutes: 15

